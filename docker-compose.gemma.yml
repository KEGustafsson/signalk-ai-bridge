services:
  gemma:
    image: ai/gemma:latest
    container_name: gemma
    restart: unless-stopped
    networks:
      - ai-internal
    ports:
      - "127.0.0.1:7860:7860"
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 8g
    cpus: '4.0'

  signalk-ai-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signalk-ai-bridge
    restart: unless-stopped
    depends_on:
      - gemma
    networks:
      - ai-internal
    environment:
      AI_BRIDGE_MODEL_URL: "http://gemma:7860"
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: '2.0'

networks:
  ai-internal:
    driver: bridge
    internal: true
