services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
#      - /etc/nv_tegra_release:/etc/nv_tegra_release
    environment:
      - OLLAMA_DEBUG=1
#      - JETSON_JETPACK=6
#      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          memory: 2G
#          devices:
#            - driver: nvidia
#              count: all
#              capabilities: [gpu]
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull gemma4:e2b && wait"


